<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة رقيم - تسجيل الفرق والنوادي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1b2138; /* لون الخلفية الكحلي الداكن من الشعار */
            --primary-light: #4cdbf1; /* اللون السماوي الفاتح من الشعار */
            --white: #ffffff;
            --light-gray: #f4f7f6;
            --text-dark: #333333;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* لضمان ظهور المحتوى في الهواتف */
            min-height: 100vh;
            color: var(--primary-dark);
        }

        .container {
            background-color: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border-top: 6px solid var(--primary-light);
            margin: 20px 15px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header img {
            max-width: 140px;
            height: auto;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 22px;
            color: var(--primary-dark);
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px; /* يمنع التكبير التلقائي في أجهزة الآيفون */
            box-sizing: border-box;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            background-color: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(76, 219, 241, 0.2);
            background-color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-dark);
            color: var(--white);
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-family: 'Cairo', sans-serif;
            margin-top: 10px;
            -webkit-appearance: none;
        }

        .submit-btn:hover {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .submit-btn:disabled {
            background-color: #a0a0a0;
            cursor: not-allowed;
            color: #fff;
        }

        .message {
            display: none;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            display: block;
            border: 1px solid #c8e6c9;
        }

        .error {
            background-color: #ffebee;
            color: #c62828;
            display: block;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://nahno-new.s3.eu-west-3.amazonaws.com/ngo/profile-251126181018liCCv.png" alt="شعار رقيم">
            <h1>نموذج تقديم الفرق والنوادي</h1>
            <p>جامعات محافظات الشمال - الأردن</p>
        </div>

        <form id="raqeemForm">
            <div class="form-group">
                <label for="repName">اسم الممثل عن الفريق</label>
                <input type="text" id="repName" name="repName" required placeholder="أدخل الاسم الكامل">
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف</label>
                <input type="tel" id="phone" name="phone" required placeholder="07XXXXXXXX">
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>

            <div class="form-group">
                <label for="university">اسم الجامعة</label>
                <input type="text" id="university" name="university" required placeholder="أدخل اسم الجامعة">
            </div>

            <div class="form-group">
                <label for="teamName">اسم الفريق التطوعي / النادي</label>
                <input type="text" id="teamName" name="teamName" required placeholder="أدخل اسم الفريق أو النادي">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">إرسال البيانات</button>
            <div id="formMessage" class="message"></div>
        </form>
    </div>

    <script>
        // رابط جوجل سكريبت الجديد الخاص بك
        const scriptURL = 'https://script.google.com/macros/s/AKfycbySeALgG0IwqB0poZWg0ZNfDQdS-na2j85HfvKoDRKabEHpeHKzsueq3zXNleyzdoqA3Q/exec';
        
        const form = document.getElementById('raqeemForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('formMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.innerHTML = 'جاري الإرسال...';
            btn.disabled = true;

            let requestBody = new FormData(form);

            fetch(scriptURL, { method: 'POST', body: requestBody })
                .then(response => {
                    msg.innerHTML = 'تم إرسال بياناتك بنجاح! شكراً لك.';
                    msg.className = 'message success';
                    form.reset();
                    btn.innerHTML = 'إرسال البيانات';
                    btn.disabled = false;
                    
                    // إخفاء الرسالة بعد 5 ثواني
                    setTimeout(function() {
                        msg.style.display = 'none';
                        msg.className = 'message';
                    }, 5000);
                })
                .catch(error => {
                    msg.innerHTML = 'حدث خطأ أثناء الإرسال. يرجى المحاولة لاحقاً.';
                    msg.className = 'message error';
                    btn.innerHTML = 'إرسال البيانات';
                    btn.disabled = false;
                    console.error('Error!', error.message);
                });
        });
    </script>
</body>
</html>
